discovery:
  es_url: "${ES_HOST}"
  es_user: "${ES_USER}"
  es_password: "${ES_PWD}"
  index: "${ES_INDEX}"
  batch_size: 500
  min_year: 2015
  min_citations: 10
  language: "en"

downloader:
  output_dir: "./data/pdfs"
  max_concurrent: 10
  rate_limit_per_domain: 1.0
  timeout: 30
  max_retries: 3

extractor:
  grobid_url: "${GROBID_URL}"
  timeout: 60

chunker:
  max_chunk_size: 1000

embedder:
  model_name: "BAAI/bge-small-en-v1.5"
  batch_size: 256

storage:
  qdrant_url: "${QDRANT_URL}"
  collection_name: "${QDRANT_COLLECTION}"

pipeline:
  checkpoint_interval: 100
  max_failures_per_batch: 50
  max_papers: 100000
  log_level: "INFO"
